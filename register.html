<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | MURO</title>
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark" class="auth-page">
  <div class="auth-card">
    <a href="index.html" class="auth-logo">MURO</a>
    <h2>Join the Gallery</h2>
    <form>
      <div class="form-group"><input type="text" placeholder="Full Name" required></div>
      <div class="form-group"><input type="email" placeholder="Email Address" required></div>
      <div class="form-group"><input type="password" placeholder="Password" required></div>
      <button type="submit" class="btn btn-primary">Create Account</button>
    </form>
    <div class="auth-footer"><p>Already have an account? <a href="login.html">Login</a></p></div>
  </div>
</body>
</html>
